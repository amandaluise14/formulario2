<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Cadastro Aluno</title>]
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <main>

         <div class="container border rounded-4 shadow-lg p-3 mb-5 bg-body-tertiary rounded" style="margin-top: 50px;" >
    
            <h2 id="titulo" class="text-center" style="margin-top: 20px ;">Cadastro Aluno</h2>
            <p id="subtitulo" class="text-center">Preencha os dados abaixo para realizar o registro completo do aluno no sistema acadêmico.</p>
    <form id="formulario" class="row g-3 needs-validation" novalidate>

  <div class="col-md-6">
    <label for="Nome" class="form-label">Nome Completo</label>
    <input type="text" class="form-control" id="nome">
    <div class="valid-feedback">
    </div>
  </div>

  <div class="col-md-6">
    <label for="CPF" class="form-label">CPF</label>
    <input type="text" class="form-control" id="cpf">
    <div class="valid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="DatadeNascimento" class="form-label">Data de Nascimento</label>
      <input type="date" class="form-control" id="dataNascimento">
      <div class="invalid-feedback">
      </div>
    </div>

  <div class="col-md-4">
    <label for="Telefone" class="form-label">Telefone</label>
    <input type="text" class="form-control" id="telefone">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-4">
    <label for="email" class="form-label">Email</label>
    <div class="input-group has-validation">
      <span class="input-group-text" id="inputGroupPrepend">@</span>
      <input type="text" class="form-control" id="email" aria-describedby="inputGroupPrepend" required>
      <div class="invalid-feedback">
      </div>
    </div>
  </div>

  <div class="col-md-12">
    <label for="Endereco" class="form-label">Endereço completo</label>
    <input type="text" class="form-control" id="endereco">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-4">
    <label for="Cidade" class="form-label">Cidade</label>
    <input type="text" class="form-control" id="cidade">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-4">
    <label for="estado" class="form-label">Estado</label>
    <input type="text" class="form-control" id="estado">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-4">
    <label for="CEP" class="form-label">CEP</label>
    <input type="text" class="form-control" id="cep">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-6">
    <label for="Curso" class="form-label">Curso</label>
    <input type="text" class="form-control" id="curso">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-6">
    <label for="Matricula" class="form-label">Matrícula</label>
    <input type="text" class="form-control" id="matricula">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-6">
    <label for="Senha" class="form-label">Senha</label>
    <input type="text" class="form-control" id="senha">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="col-md-6">
    <label for="Confirmar" class="form-label">Confirmar Senha</label>
    <input type="text" class="form-control" id="confirmar">
    <div class="invalid-feedback">
    </div>   
  </div>

  <div class="d-grid gap-2">
    <button class="btn btn-primary" type="submit">Cadastrar Aluno</button>
  </div>
</form>

</div>
</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
